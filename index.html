<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Choose Your Style · Black Tie Affair</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Didact+Gothic&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #b8a882;
      --gold-light: #cfc09a;
      --bg: #0c0b09;
      --bg2: #111111;
      --bg3: #161410;
      --border: #222222;
      --text: #f0ece4;
      --muted: #666666;
    }

    body {
      font-family: 'Didact Gothic', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0;
    }

    .header {
      text-align: center;
      padding: 3rem 1.5rem 2rem;
      border-bottom: 1px solid var(--border);
    }

    .eyebrow {
      font-size: 10px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 12px;
    }

    .main-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(26px, 5vw, 40px);
      font-weight: 300;
      font-style: italic;
      line-height: 1.2;
      color: var(--text);
    }

    .main-title strong {
      font-style: normal;
      font-weight: 600;
    }

    .subtitle {
      margin-top: 10px;
      font-size: 11px;
      letter-spacing: 0.14em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .grid-wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    @media (max-width: 580px) {
      .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    }

    /* Card */
    .card {
      cursor: pointer;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      background: var(--bg2);
      position: relative;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.5s ease forwards;
      transition: border-color .3s, transform .3s, box-shadow .3s;
    }

    .card:nth-child(1) { animation-delay: .05s }
    .card:nth-child(2) { animation-delay: .10s }
    .card:nth-child(3) { animation-delay: .15s }
    .card:nth-child(4) { animation-delay: .20s }
    .card:nth-child(5) { animation-delay: .25s }
    .card:nth-child(6) { animation-delay: .30s }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .card:hover {
      border-color: var(--gold);
      transform: translateY(-4px);
      box-shadow: 0 10px 36px rgba(184,168,130,.14);
    }

    .card.selected {
      border-color: var(--gold);
      box-shadow: 0 0 0 1px var(--gold), 0 10px 36px rgba(184,168,130,.18);
    }

    /* Image */
    .img-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 3 / 4;
      overflow: hidden;
      background: #161410;
    }

    .img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      display: block;
      transition: transform .6s ease, filter .4s ease;
      filter: grayscale(25%) contrast(1.05) brightness(.9);
    }

    .card:hover .img-wrap img,
    .card.selected .img-wrap img {
      transform: scale(1.07);
      filter: grayscale(0%) contrast(1.1) brightness(1.02);
    }

    /* Shimmer skeleton */
    .shimmer {
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg, #1a1a1a 30%, #252520 50%, #1a1a1a 70%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      z-index: 2;
      transition: opacity .4s;
    }

    @keyframes shimmer {
      to { background-position: -200% 0; }
    }

    .shimmer.gone { opacity: 0; pointer-events: none; }

    .img-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,.65) 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* Placeholder */
    .img-placeholder {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
      z-index: 1;
    }

    .img-placeholder.show { display: flex; }

    .ph-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 42px;
      font-weight: 300;
      font-style: italic;
      color: #2a2a2a;
    }

    .ph-hint {
      font-size: 9px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: #2a2a2a;
    }

    /* Check badge */
    .check-badge {
      position: absolute;
      top: 9px;
      right: 9px;
      z-index: 3;
      width: 23px;
      height: 23px;
      background: var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(.4) rotate(-20deg);
      transition: opacity .25s, transform .3s cubic-bezier(.34,1.56,.64,1);
    }

    .card.selected .check-badge {
      opacity: 1;
      transform: scale(1) rotate(0);
    }

    .check-badge svg {
      width: 12px; height: 12px;
      stroke: #0c0b09;
      stroke-width: 2.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Pulse ring on select */
    @keyframes ring {
      0%   { box-shadow: 0 0 0 0 rgba(184,168,130,.5), 0 0 0 1px var(--gold); }
      100% { box-shadow: 0 0 0 10px rgba(184,168,130,0), 0 0 0 1px var(--gold); }
    }

    .card.pulse { animation: ring .5s ease-out forwards; }

    /* Name bar */
    .name-bar {
      padding: 11px 13px 12px;
      border-top: 1px solid var(--border);
      text-align: center;
      transition: border-color .25s, background .25s;
    }

    .card.selected .name-bar {
      border-top-color: var(--gold);
      background: var(--bg3);
    }

    .style-name {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--text);
      line-height: 1.3;
    }

    .style-desc {
      display: block;
      font-size: 9px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 3px;
      transition: color .25s;
    }

    .card.selected .style-desc { color: var(--gold); }

    /* Footer */
    .footer {
      text-align: center;
      padding: 0 1.5rem 4rem;
    }

    .sel-msg {
      font-size: 12px;
      letter-spacing: .07em;
      color: #444;
      margin-bottom: 16px;
      min-height: 20px;
      transition: color .3s;
    }

    .sel-msg.active { color: var(--gold); }

    .cta-btn {
      display: inline-block;
      background: var(--gold);
      color: #0c0b09;
      font-family: 'Didact Gothic', sans-serif;
      font-size: 10px;
      letter-spacing: .22em;
      text-transform: uppercase;
      padding: 14px 40px;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      opacity: .3;
      pointer-events: none;
      transition: background .2s, opacity .3s, transform .15s;
    }

    .cta-btn.ready {
      opacity: 1;
      pointer-events: all;
    }

    .cta-btn.ready:hover {
      background: var(--gold-light);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>

  <header class="header">
    <p class="eyebrow">Black Tie Affair &nbsp;·&nbsp; Honolulu, Hawaiʻi</p>
    <h1 class="main-title">Choose Your <strong>Tuxedo Style</strong></h1>
    <p class="subtitle">Select one look to continue</p>
  </header>

  <main class="grid-wrap">
    <div class="grid" id="styleGrid"></div>
  </main>

  <div class="footer">
    <p class="sel-msg" id="selMsg">Select a style to continue</p>
    <button class="cta-btn" id="ctaBtn">Confirm My Style</button>
  </div>

  <script>
    const styles = [
      {
        name: "Classic Black",
        desc: "Peak lapel · Traditional",
        src: "/images/classic-black.jpg"
      },
      {
        name: "White Dinner Jacket",
        desc: "Shawl lapel · Resort",
        src: "/images/white-dinner.jpg"
      },
      {
        name: "Slim Fit Black",
        desc: "Notch lapel · Modern",
        src: "/images/slim-fit.jpg"
      },
      {
        name: "Midnight Navy",
        desc: "Shawl lapel · Distinctive",
        src: "/images/midnight-navy.jpg"
      },
      {
        name: "Burgundy Velvet",
        desc: "Peak lapel · Bold",
        src: "/images/burgundy-velvet.jpg"
      },
      {
        name: "Grey Herringbone",
        desc: "Notch lapel · Classic",
        src: "/images/grey-herringbone.jpg"
      }
    ];

    const roman = ['I','II','III','IV','V','VI'];
    let selected = null;

    const grid   = document.getElementById('styleGrid');
    const selMsg = document.getElementById('selMsg');
    const ctaBtn = document.getElementById('ctaBtn');

    styles.forEach((s, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.style = s.name;

      card.innerHTML = `
        <div class="img-wrap">
          <div class="shimmer" id="sh${i}"></div>
          <img id="img${i}" src="${s.src}" alt="${s.name}" />
          <div class="img-overlay"></div>
          <div class="img-placeholder" id="ph${i}">
            <span class="ph-num">${roman[i]}</span>
            <span class="ph-hint">Add photo</span>
          </div>
          <div class="check-badge">
            <svg viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3"/></svg>
          </div>
        </div>
        <div class="name-bar">
          <span class="style-name">${s.name}</span>
          <span class="style-desc">${s.desc}</span>
        </div>
      `;

      const img = card.querySelector(`#img${i}`);
      const sh  = card.querySelector(`#sh${i}`);
      const ph  = card.querySelector(`#ph${i}`);

      img.onload  = () => { sh.classList.add('gone'); };
      img.onerror = () => {
        sh.classList.add('gone');
        img.style.display = 'none';
        ph.classList.add('show');
      };

      card.onclick = () => {
        if (selected) {
          selected.classList.remove('selected', 'pulse');
        }
        void card.offsetWidth;
        card.classList.add('selected', 'pulse');
        selected = card;

        selMsg.textContent = '✦  ' + s.name + '  —  selected';
        selMsg.classList.add('active');
        ctaBtn.classList.add('ready');
      };

      grid.appendChild(card);
    });

    ctaBtn.onclick = () => {
      if (!selected) return;
      const styleName = selected.dataset.style;
      // Connect to your Tally form — replace YOUR_FORM_ID below:
      // window.location.href = 'https://tally.so/r/YOUR_FORM_ID?style=' + encodeURIComponent(styleName);
      alert('Style confirmed: ' + styleName + '\n\nNext: uncomment the Tally redirect line in the script.');
    };
  </script>

</body>
</html>
