<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Black Tie Affair — Style Selector</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Lato', sans-serif; background: #fafafa; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; }
    .wrap { width: 100%; max-width: 640px; }
    .progress { display: flex; gap: 6px; margin-bottom: 2rem; }
    .prog-dot { flex: 1; height: 2px; background: #e0e0e0; border-radius: 2px; transition: background 0.3s; }
    .prog-dot.active { background: #111; }
    .prog-dot.done { background: #888; }
    .step-label { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: #999; margin-bottom: 6px; }
    .step-title { font-family: 'Lato', sans-serif; font-size: 1.4rem; font-weight: 300; color: #111; margin-bottom: 1.75rem; line-height: 1.3; }
    .cards { display: grid; gap: 12px; margin-bottom: 2rem; }
    .cards.two { grid-template-columns: 1fr 1fr; }
    .cards.three { grid-template-columns: 1fr 1fr 1fr; }
    .card { border: 1px solid #e8e8e8; border-radius: 12px; cursor: pointer; transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s; overflow: hidden; background: #fff; }
    .card:hover { border-color: #bbb; transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
    .card.selected { border: 2px solid #111; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .card-img { width: 100%; aspect-ratio: 3/4; display: flex; align-items: center; justify-content: center; background: #f5f5f5; position: relative; }
    .card-img svg { width: 55%; height: 55%; color: #333; }
    .card-check { position: absolute; top: 10px; right: 10px; width: 24px; height: 24px; border-radius: 50%; background: #111; color: #fff; display: none; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; }
    .card.selected .card-check { display: flex; }
    .card-info { padding: 14px; border-top: 1px solid #f0f0f0; }
    .card-name { font-size: 13px; font-weight: 700; color: #111; margin-bottom: 3px; }
    .card-desc { font-size: 11px; color: #888; line-height: 1.5; }
    .actions { display: flex; align-items: center; justify-content: space-between; margin-top: 0.5rem; }
    .btn-back { background: none; border: none; font-size: 13px; color: #999; cursor: pointer; padding: 10px 0; font-family: 'Lato', sans-serif; letter-spacing: 1px; transition: color 0.2s; }
    .btn-back:hover { color: #111; }
    .btn-next { background: #111; color: #fff; border: none; border-radius: 8px; padding: 12px 32px; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; transition: background 0.2s; font-family: 'Lato', sans-serif; font-weight: 700; }
    .btn-next:disabled { background: #ccc; cursor: not-allowed; }
    .btn-next:not(:disabled):hover { background: #333; }
    .summary-box { border: 1px solid #e8e8e8; border-radius: 12px; overflow: hidden; margin-bottom: 1.75rem; background: #fff; }
    .summary-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; border-bottom: 1px solid #f0f0f0; }
    .summary-row:last-child { border-bottom: none; }
    .summary-label { font-size: 10px; color: #999; letter-spacing: 3px; text-transform: uppercase; }
    .summary-val { font-size: 13px; font-weight: 700; color: #111; }
    .btn-full { width: 100%; padding: 16px; background: #111; color: #fff; border: none; border-radius: 8px; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; font-family: 'Lato', sans-serif; font-weight: 700; margin-bottom: 10px; transition: background 0.2s; }
    .btn-full:hover { background: #333; }
    .btn-full.copied { background: #2d6a4f; }
    .btn-restart { width: 100%; padding: 12px; background: none; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 11px; color: #999; cursor: pointer; font-family: 'Lato', sans-serif; letter-spacing: 2px; text-transform: uppercase; transition: border-color 0.2s, color 0.2s; }
    .btn-restart:hover { border-color: #bbb; color: #555; }
    .summary-note { font-size: 11px; color: #aaa; text-align: center; line-height: 1.7; margin-top: 12px; }
    @media (max-width: 480px) { .cards.three { grid-template-columns: 1fr 1fr; } }
  </style>
</head>

</div>
